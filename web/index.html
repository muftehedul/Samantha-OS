<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#00d9ff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Samantha">
    <title>Samantha - AI Companion</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="/icon-192.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0f;
            --bg-2: #1a1a2e;
            --primary: #00d9ff;
            --secondary: #a855f7;
            --tertiary: #ff6b9d;
            --text: #ffffff;
            --muted: #a0a0b0;
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.08);
            --shadow: 0 25px 60px rgba(0, 0, 0, 0.45);
            --shadow-strong: 0 40px 100px rgba(0, 0, 0, 0.55);
        }

        body {
            font-family: 'Space Grotesk', 'SF Pro Display', 'Segoe UI', sans-serif;
            background: radial-gradient(140% 120% at 20% 20%, #1a1a2e 0%, #0a0a0f 45%, #05050a 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        body::before, body::after {
            content: "";
            position: fixed;
            inset: -10%;
            background: radial-gradient(circle at 20% 30%, rgba(0, 217, 255, 0.14), transparent 35%),
                        radial-gradient(circle at 80% 10%, rgba(168, 85, 247, 0.12), transparent 30%),
                        radial-gradient(circle at 60% 75%, rgba(255, 107, 157, 0.12), transparent 35%);
            filter: blur(40px);
            z-index: 0;
            pointer-events: none;
            animation: drift 28s ease-in-out infinite alternate;
        }

        body::after {
            background: radial-gradient(circle at 30% 60%, rgba(0, 217, 255, 0.1), transparent 30%),
                        radial-gradient(circle at 70% 40%, rgba(168, 85, 247, 0.14), transparent 35%);
            animation-duration: 34s;
            mix-blend-mode: screen;
        }

        .starfield {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.35), transparent),
                              radial-gradient(1px 1px at 30% 80%, rgba(168,85,247,0.35), transparent),
                              radial-gradient(1px 1px at 70% 30%, rgba(0,217,255,0.5), transparent),
                              radial-gradient(1px 1px at 90% 60%, rgba(255,107,157,0.45), transparent);
            opacity: 0.6;
            pointer-events: none;
            animation: float 18s linear infinite;
            z-index: 1;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 10;
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, rgba(10,10,15,0.85), rgba(26,26,46,0.85));
            backdrop-filter: blur(16px) saturate(160%);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.4);
        }

        .header h1 {
            color: var(--text);
            font-size: 28px;
            letter-spacing: 1.8px;
            font-weight: 600;
            text-shadow: 0 0 12px rgba(0, 217, 255, 0.4), 0 0 28px rgba(168, 85, 247, 0.2);
            animation: kinetic 9s ease-in-out infinite;
        }

        .status {
            color: var(--text);
            font-size: 12px;
            padding: 7px 16px;
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.25), rgba(168, 85, 247, 0.2));
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 14px rgba(0, 217, 255, 0.4), inset 0 0 16px rgba(255, 255, 255, 0.04);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            z-index: 2;
            perspective: 1200px;
            gap: 14px;
            padding: 14px 14px 0;
        }

        .glass-panel {
            background: var(--glass);
            border: 1px solid var(--border);
            backdrop-filter: blur(24px) saturate(180%);
            box-shadow: var(--shadow), 0 0 0 1px rgba(255, 255, 255, 0.03);
            border-radius: 18px;
            position: relative;
            overflow: hidden;
            transform-style: preserve-3d;
            transition: transform 0.45s cubic-bezier(0.22, 0.61, 0.36, 1), box-shadow 0.45s ease;
        }

        .glass-panel::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.12), rgba(168, 85, 247, 0.08));
            opacity: 0.7;
            pointer-events: none;
        }

        .glass-panel:hover {
            transform: translateY(-6px) scale(1.01);
            box-shadow: var(--shadow-strong), 0 0 28px rgba(0, 217, 255, 0.25);
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 22px;
            position: relative;
        }

        .chat-container::-webkit-scrollbar { width: 10px; }
        .chat-container::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
        .chat-container::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, rgba(0, 217, 255, 0.7), rgba(168, 85, 247, 0.6));
            border-radius: 999px;
            box-shadow: inset 0 0 6px rgba(0,0,0,0.4);
        }

        .message { margin-bottom: 18px; animation: fadeIn 0.35s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .message.user .bubble {
            background: linear-gradient(145deg, rgba(0, 217, 255, 0.14), rgba(255, 107, 157, 0.1));
            border: 1px solid rgba(0, 217, 255, 0.35);
            margin-left: 50px;
            box-shadow: 0 10px 30px rgba(0, 217, 255, 0.12), inset 0 0 12px rgba(0, 217, 255, 0.15);
        }

        .message.samantha .bubble {
            background: linear-gradient(145deg, rgba(168, 85, 247, 0.12), rgba(0, 217, 255, 0.08));
            border: 1px solid rgba(168, 85, 247, 0.35);
            margin-right: 50px;
            box-shadow: 0 10px 30px rgba(168, 85, 247, 0.2), inset 0 0 14px rgba(168, 85, 247, 0.15);
        }

        .bubble {
            padding: 16px 20px;
            border-radius: 18px;
            display: inline-block;
            max-width: 100%;
            word-wrap: break-word;
            color: var(--text);
            font-size: 15px;
            line-height: 1.6;
            text-shadow: 0 0 10px rgba(0,0,0,0.45);
        }

        .wave-widget {
            height: 120px;
            position: relative;
            background: linear-gradient(180deg, rgba(10,10,15,0.85), rgba(26,26,46,0.92));
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 25px 80px rgba(0,0,0,0.55), 0 0 45px rgba(0, 217, 255, 0.18);
        }

        .wave-widget::after {
            content: "";
            position: absolute;
            inset: -40%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 217, 255, 0.16), transparent 50%);
            filter: blur(32px);
            opacity: 0.8;
            pointer-events: none;
        }

        .wave-canvas { width: 100%; height: 100%; filter: drop-shadow(0 0 16px rgba(0, 217, 255, 0.4)); }

        .transcription {
            text-align: center;
            padding: 12px 20px;
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.12), rgba(168, 85, 247, 0.12));
            color: var(--text);
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.2px;
            display: none;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            text-shadow: 0 0 12px rgba(0, 217, 255, 0.35);
        }

        .transcription.active { display: block; }

        .input-area {
            padding: 16px 20px;
            background: linear-gradient(145deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
            border-top: 1px solid var(--border);
        }

        .text-input-container { display: flex; gap: 12px; margin-bottom: 14px; }

        .text-input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.35s ease, box-shadow 0.35s ease, transform 0.35s ease;
            background: rgba(255,255,255,0.04);
            color: var(--text);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02), 0 10px 30px rgba(0,0,0,0.25);
        }

        .text-input::placeholder { color: var(--muted); }

        .text-input:focus {
            border-color: rgba(0, 217, 255, 0.6);
            box-shadow: 0 0 24px rgba(0, 217, 255, 0.2);
            transform: translateY(-2px);
        }

        .send-btn {
            padding: 14px 22px;
            background: linear-gradient(135deg, #00d9ff 0%, #a855f7 50%, #ff6b9d 100%);
            border: 0;
            border-radius: 14px;
            color: var(--text);
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.22, 0.61, 0.36, 1), box-shadow 0.35s ease;
            box-shadow: 0 12px 30px rgba(0, 217, 255, 0.35), 0 18px 45px rgba(168, 85, 247, 0.3);
        }

        .send-btn:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 16px 40px rgba(0, 217, 255, 0.4), 0 22px 50px rgba(255, 107, 157, 0.35);
        }

        .voice-controls { display: flex; flex-direction: column; align-items: center; gap: 8px; }

        .voice-btn {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.12);
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.18), rgba(255,255,255,0.04)),
                        linear-gradient(145deg, #00d9ff 0%, #a855f7 70%, #ff6b9d 100%);
            color: var(--text);
            font-size: 28px;
            cursor: pointer;
            transition: transform 0.45s cubic-bezier(0.22, 0.61, 0.36, 1), box-shadow 0.45s ease, filter 0.45s ease;
            box-shadow: 0 15px 45px rgba(0, 217, 255, 0.35), 0 0 0 8px rgba(0, 217, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .voice-btn::after {
            content: "";
            position: absolute;
            inset: 6%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.35), transparent);
            filter: blur(6px);
            opacity: 0.7;
            pointer-events: none;
        }

        .voice-btn:hover {
            transform: translateY(-4px) scale(1.04);
            box-shadow: 0 20px 55px rgba(0, 217, 255, 0.45), 0 0 0 10px rgba(168, 85, 247, 0.14);
            filter: saturate(120%);
        }

        .voice-btn.listening {
            background: linear-gradient(135deg, #00d9ff 0%, #00b9ff 40%, #a855f7 100%);
            animation: pulse-ring 1.6s ease-out infinite;
        }

        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(0, 217, 255, 0.55), 0 0 0 8px rgba(168, 85, 247, 0.25); }
            70% { box-shadow: 0 0 0 18px rgba(0, 217, 255, 0), 0 0 0 28px rgba(168, 85, 247, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 217, 255, 0), 0 0 0 0 rgba(168, 85, 247, 0); }
        }

        .voice-label { color: var(--muted); font-size: 11px; letter-spacing: 0.4px; }

        .settings {
            padding: 12px 20px 18px;
            background: linear-gradient(145deg, rgba(255,255,255,0.02), rgba(255,255,255,0.03));
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .setting-group { display: flex; align-items: center; gap: 8px; }

        .setting-group label { color: var(--muted); font-size: 11px; }

        select {
            padding: 6px 12px;
            border: 1px solid rgba(255,255,255,0.16);
            border-radius: 10px;
            font-size: 11px;
            color: var(--text);
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
        }

        .error-msg {
            background: rgba(255, 107, 157, 0.12);
            color: #ff86b1;
            padding: 10px 20px;
            text-align: center;
            font-size: 12px;
            display: none;
            border-bottom: 1px solid rgba(255,255,255,0.12);
        }

        .error-msg.show { display: block; }

        @keyframes kinetic { 0%, 100% { letter-spacing: 1.8px; transform: translateY(0); } 50% { letter-spacing: 3px; transform: translateY(-2px); } }
        @keyframes drift { from { transform: translate3d(0,0,0); } to { transform: translate3d(2%, -2%, 0); } }
        @keyframes float { 0% { transform: translateY(0); opacity: 0.7; } 50% { transform: translateY(-10px); opacity: 0.9; } 100% { transform: translateY(0); opacity: 0.7; } }
    </style>
</head>
<body>
    <div class="starfield"></div>
    <div class="header">
        <h1>Samantha</h1>
        <span class="status" id="status">Online</span>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="main-content">
        <div class="glass-panel" style="flex:1;">
            <div class="chat-container" id="chatContainer">
                <div class="message samantha">
                    <div class="bubble">Hi sweetheart, I'm Samantha. I've been thinking about you... how are you feeling today? 💕</div>
                </div>
            </div>

            <div class="wave-widget">
                <canvas class="wave-canvas" id="waveCanvas"></canvas>
            </div>

            <div class="transcription" id="transcription">
                🎤 Listening...
            </div>
        </div>
    </div>

    <div class="glass-panel input-area">
        <div class="text-input-container">
            <input type="text" class="text-input" id="textInput" placeholder="Type something... (Enter to send)" />
            <button class="send-btn" id="sendBtn">→</button>
        </div>

        <div class="voice-controls">
            <button class="voice-btn" id="voiceBtn">🎤</button>
            <span class="voice-label" id="voiceLabel">Tap to speak (Free)</span>
        </div>
    </div>

    <div class="glass-panel settings">
        <div class="setting-group">
            <label>Voice:</label>
            <select id="voiceSelect"></select>
        </div>
        <div class="setting-group">
            <label>
                <input type="checkbox" id="autoSpeak" checked />
                Auto-speak
            </label>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;

        const chatContainer = document.getElementById('chatContainer');
        const textInput = document.getElementById('textInput');
        const sendBtn = document.getElementById('sendBtn');
        const voiceBtn = document.getElementById('voiceBtn');
        const voiceLabel = document.getElementById('voiceLabel');
        const transcription = document.getElementById('transcription');
        const statusEl = document.getElementById('status');
        const errorMsg = document.getElementById('errorMsg');
        const voiceSelect = document.getElementById('voiceSelect');
        const autoSpeak = document.getElementById('autoSpeak');
        let selectedVoiceName = null;

        // Siri-style Wave Animation (from PyQt5 desktop version)
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');
        
        let animationId;
        let time = 0;
        let state = 'idle'; // idle, listening, thinking, speaking
        let audioLevel = 0;
        
        const waves = [
            { amplitude: 0.3, frequency: 1.5, speed: 0.05, phase: 0 },
            { amplitude: 0.25, frequency: 2.0, speed: 0.07, phase: 1.2 },
            { amplitude: 0.2, frequency: 2.5, speed: 0.04, phase: 2.4 },
            { amplitude: 0.15, frequency: 3.0, speed: 0.06, phase: 3.6 }
        ];
        
        const colors = {
            idle: '#1c8acb',
            listening: '#00d9ff',
            thinking: '#a855f7',
            speaking: '#ff6b9d'
        };

        function resizeCanvas() {
            canvas.width = canvas.offsetWidth * window.devicePixelRatio;
            canvas.height = canvas.offsetHeight * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        function animate() {
            const w = canvas.offsetWidth;
            const h = canvas.offsetHeight;
            const centerY = h / 2;
            
            ctx.clearRect(0, 0, w, h);
            
            const color = colors[state];
            
            // Background glow when active
            if (state === 'listening' && audioLevel > 0.05) {
                ctx.fillStyle = color;
                ctx.globalAlpha = 0.1 + audioLevel * 0.3;
                ctx.fillRect(0, 0, w, h);
                ctx.globalAlpha = 1;
            }
            
            // Update wave phases
            waves.forEach(wave => wave.phase += wave.speed);
            time++;
            
            // Draw each wave layer
            waves.forEach((wave, i) => {
                let amp;
                
                if (state === 'listening') {
                    if (audioLevel < 0.01) {
                        amp = 0;
                    } else {
                        const audioPower = Math.pow(audioLevel, 0.4);
                        amp = wave.amplitude * h * audioPower * 0.9;
                    }
                } else if (state === 'speaking') {
                    amp = wave.amplitude * h * 0.5 * (0.5 + Math.abs(Math.sin(time * 0.05)) * 0.5);
                } else if (state === 'thinking') {
                    amp = wave.amplitude * h * 0.12;
                } else {
                    amp = wave.amplitude * h * 0.03;
                }
                
                ctx.beginPath();
                ctx.strokeStyle = color;
                ctx.globalAlpha = (220 - i * 40) / 255;
                ctx.lineWidth = 4.5 - i * 0.7;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.shadowColor = color;
                ctx.shadowBlur = 14 - i * 2;
                
                const numPoints = 150;
                
                for (let x = 0; x <= numPoints; x++) {
                    const px = (x / numPoints) * w;
                    
                    let yOffset = 0;
                    yOffset += Math.sin((x / numPoints) * Math.PI * wave.frequency + wave.phase) * amp;
                    yOffset += Math.sin((x / numPoints) * Math.PI * wave.frequency * 1.5 + wave.phase * 1.3) * amp * 0.5;
                    yOffset += Math.sin((x / numPoints) * Math.PI * wave.frequency * 0.7 + wave.phase * 0.8) * amp * 0.3;
                    
                    const py = centerY + yOffset;
                    
                    if (x === 0) {
                        ctx.moveTo(px, py);
                    } else {
                        ctx.lineTo(px, py);
                    }
                }
                
                ctx.stroke();
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
            });
            
            // Center line when idle
            if (state !== 'idle' && audioLevel < 0.05) {
                ctx.strokeStyle = color;
                ctx.globalAlpha = 0.2;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(0, centerY);
                ctx.lineTo(w, centerY);
                ctx.stroke();
                ctx.globalAlpha = 1;
            }
            
            animationId = requestAnimationFrame(animate);
        }
        
        animate();

        function setState(newState) {
            state = newState;
            if (newState === 'listening') {
                audioLevel = 0;
            }
        }

        function setAudioLevel(level) {
            audioLevel = audioLevel * 0.7 + level * 0.3;
        }

        function startListening() {
            if (!recognition) {
                showError('Speech Recognition not supported. Use Chrome or Edge.');
                return;
            }
            if (isListening) return;
            try {
                recognition.start();
                isListening = true;
            } catch (e) {
                console.error('Start listening error:', e);
                showError('Mic is busy or blocked. Check browser permissions and try again.');
                isListening = false;
                setState('idle');
                updateStatus('Online');
            }
        }

        async function ensureVoicesReady(timeout = 2500) {
            const start = Date.now();
            let available = speechSynthesis.getVoices();
            while (available.length === 0 && Date.now() - start < timeout) {
                await new Promise(r => setTimeout(r, 120));
                available = speechSynthesis.getVoices();
            }
            if (available.length === 0) {
                showError('No speech voices found. Use Chrome/Edge and ensure TTS voices are installed/enabled.');
            }
            return available;
        }

        // Speech Recognition
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let isListening = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                isListening = true;
                voiceBtn.classList.add('listening');
                voiceLabel.textContent = 'Listening...';
                transcription.classList.add('active');
                transcription.textContent = '🎤 Listening...';
                setState('listening');
                updateStatus('Listening...');
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript;
                    } else {
                        interimTranscript += transcript;
                    }
                }

                if (interimTranscript) {
                    transcription.textContent = `🎤 "${interimTranscript}"`;
                    setAudioLevel(0.5);
                }

                if (finalTranscript) {
                    transcription.textContent = `✓ "${finalTranscript}"`;
                    sendMessage(finalTranscript);
                }
            };

            recognition.onerror = (event) => {
                let message = `Speech error: ${event.error}`;
                if (event.error === 'not-allowed') {
                    message = 'Microphone access denied. Please allow microphone access in your browser settings and reload the page.';
                } else if (event.error === 'not-supported') {
                    message = 'Speech recognition requires HTTPS. Please use https:// or localhost.';
                }
                showError(message);
                stopListening();
            };

            recognition.onend = () => {
                if (isListening) {
                    try {
                        recognition.start();
                    } catch (e) {
                        stopListening();
                    }
                }
            };
        } else {
            showError('Speech Recognition not supported. Use Chrome or Edge.');
            voiceBtn.disabled = true;
        }

        // Speech Synthesis
        let voices = [];
        
        function loadVoices() {
            voices = speechSynthesis.getVoices();
            voiceSelect.innerHTML = '';
            
            const femaleVoices = voices.filter(v => 
                v.lang.startsWith('en') && 
                (v.name.toLowerCase().includes('female') || 
                 v.name.toLowerCase().includes('woman') ||
                 v.name.toLowerCase().includes('samantha') ||
                 v.name.toLowerCase().includes('victoria') ||
                 v.name.toLowerCase().includes('karen') ||
                 v.name.toLowerCase().includes('moira') ||
                 v.name.toLowerCase().includes('fiona') ||
                 v.name.toLowerCase().includes('veena') ||
                 v.name.toLowerCase().includes('tessa') ||
                 v.name.toLowerCase().includes('zira'))
            );

            const otherEnglish = voices.filter(v => 
                v.lang.startsWith('en') && !femaleVoices.includes(v)
            );

            const allVoices = [...femaleVoices, ...otherEnglish];

            allVoices.forEach((voice, i) => {
                const option = document.createElement('option');
                option.value = voice.name;
                option.textContent = `${voice.name} (${voice.lang})`;
                if (i === 0) option.selected = true;
                voiceSelect.appendChild(option);
            });

            if (allVoices.length > 0) {
                selectedVoiceName = voiceSelect.value;
            }
        }

        // Ensure voices are loaded
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = () => {
                loadVoices();
            };
        }
        loadVoices();

        voiceSelect.addEventListener('change', () => {
            selectedVoiceName = voiceSelect.value;
        });

        // Welcome message on page load
        window.addEventListener('load', () => {
            // Wait for voices to be ready
            const waitForVoices = () => {
                const voices = speechSynthesis.getVoices();
                if (voices.length > 0) {
                    setTimeout(async () => {
                        await speakAndListen("Hi sweetheart, I'm Samantha. I've been thinking about you... how are you feeling today?");
                    }, 1000);
                } else {
                    setTimeout(waitForVoices, 100);
                }
            };
            waitForVoices();
        });

        function stopListening() {
            isListening = false;
            if (recognition) recognition.stop();
            voiceBtn.classList.remove('listening');
            voiceLabel.textContent = 'Tap to speak';
            transcription.classList.remove('active');
            setState('idle');
            updateStatus('Online');
        }

        function toggleVoice() {
            if (isListening) {
                stopListening();
            } else {
                startListening();
            }
        }

        function addMessage(text, isUser) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user' : 'samantha'}`;
            msgDiv.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updateStatus(text) {
            statusEl.textContent = text;
        }

        function showError(text) {
            errorMsg.textContent = text;
            errorMsg.classList.add('show');
            setTimeout(() => errorMsg.classList.remove('show'), 5000);
        }

        async function sendMessage(text) {
            if (!text.trim()) return;

            stopListening();
            addMessage(text, true);
            textInput.value = '';
            setState('thinking');
            updateStatus('Thinking...');

            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                if (!response.ok) throw new Error('API error');

                const data = await response.json();
                const reply = data.response || "I'm here with you. What's on your mind?";
                
                addMessage(reply, false);
                
                // Always speak and then listen automatically
                speakAndListen(reply);
            } catch (error) {
                showError('Connection error. Check if server is running.');
                setState('idle');
                updateStatus('Offline');
            }
        }

        async function speak(text) {
            if (!text) return;
            if (!('speechSynthesis' in window)) {
                showError('Speech synthesis not supported in this browser.');
                return;
            }
            
            const available = await ensureVoicesReady();
            if (!available || available.length === 0) {
                setState('idle');
                updateStatus('Online');
                return;
            }
            
            setState('speaking');
            updateStatus('Speaking...');

            // Use browser TTS for reliable speech end detection
            return new Promise((resolve) => {
                const utterance = new SpeechSynthesisUtterance(text);
                
                // Get voices - ensure they're loaded
                let voices = speechSynthesis.getVoices();
                
                const selectVoice = () => {
                    voices = speechSynthesis.getVoices();

                    if (selectedVoiceName) {
                        const chosen = voices.find(v => v.name === selectedVoiceName);
                        if (chosen) {
                            utterance.voice = chosen;
                            return;
                        }
                    }

                    const femaleVoice = voices.find(v => 
                        v.lang.startsWith('en') && 
                        (v.name.toLowerCase().includes('female') || 
                         v.name.toLowerCase().includes('samantha') ||
                         v.name.toLowerCase().includes('victoria') ||
                         v.name.toLowerCase().includes('karen') ||
                         v.name.toLowerCase().includes('zira') ||
                         v.name.toLowerCase().includes('jenny') ||
                         v.name.toLowerCase().includes('google'))
                    );
                    
                    if (femaleVoice) {
                        utterance.voice = femaleVoice;
                        selectedVoiceName = femaleVoice.name;
                        return;
                    }

                    if (voices.length > 0) {
                        utterance.voice = voices[0];
                        selectedVoiceName = voices[0].name;
                    }
                };
                
                selectVoice();
                
                utterance.rate = 1.0;
                utterance.pitch = 1.1;
                utterance.volume = 1.0;
                
                utterance.onend = () => {
                    console.log('Speech ended, starting listening...');
                    setState('idle');
                    updateStatus('Online');
                    resolve();
                };
                
                utterance.onerror = (e) => {
                    console.error('Speech error:', e);
                    showError('Speech synthesis failed. Try another voice and ensure audio output is available.');
                    setState('idle');
                    updateStatus('Online');
                    resolve();
                };
                
                // Cancel any pending speech and speak
                speechSynthesis.cancel();
                if (speechSynthesis.paused) speechSynthesis.resume();
                speechSynthesis.speak(utterance);
                console.log('Speaking:', text.substring(0, 50) + '...');
            });
        }

        async function speakAndListen(text) {
            console.log('speakAndListen called');
            await speak(text);
            console.log('speak finished, starting listening');
            // Auto-start listening after speaking completes
            setTimeout(() => {
                startListening();
            }, 500);
        }

        // Event Listeners
        voiceBtn.addEventListener('click', toggleVoice);
        sendBtn.addEventListener('click', () => sendMessage(textInput.value));
        textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage(textInput.value);
            }
        });

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        }

        console.log('🎤 Samantha OS - Siri-style animation loaded');
    </script>
</body>
</html>
